services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-gateway:latest
    container_name: ai-gateway
    restart: unless-stopped
    ports:
      - '${PORT:-4000}:4000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=/app/data/gateway.db
      - REDIS_URL=redis://redis:6379
    volumes:
      - gateway-data:/app/data
      - gateway-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  gateway-data:
  gateway-logs:
  redis-data:
